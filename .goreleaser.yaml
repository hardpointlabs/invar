version: 2

project_name: invar

before:
  hooks:
    - go mod tidy

builds:
  - id: default
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats: ["tar.gz"]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}

kos:
  - id: default
    repositories:
      - ghcr.io/hardpointlabs/invar
    bare: true
    annotations:
      org.opencontainers.image.source: "https://github.com/hardpointlabs/invar"
      org.opencontainers.image.licenses: "Apache-2.0"
      org.opencontainers.image.description: "Invar DB"
    tags:
      - "{{.Tag}}"
      - latest
    platforms:
      - linux/amd64
      - linux/arm64
    sbom: spdx
    sbom_directory: "out/sbom"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
